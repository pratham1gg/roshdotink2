name: Fetch Letterboxd Data

on:
  schedule:
    - cron: "0 4 * * *" # Daily at 4 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Letterboxd RSS feeds
        run: python _scripts/fetch_letterboxd.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/letterboxd_diary.json _data/letterboxd_watchlist.json
          git diff --staged --quiet || git commit -m "chore: update Letterboxd data"
          git push
